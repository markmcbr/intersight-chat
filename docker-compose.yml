# Default compose: works on any host, no GPU required.
# To enable NVIDIA GPU passthrough for Ollama, layer in docker-compose.gpu.yml:
#   docker compose -f docker-compose.yml -f docker-compose.gpu.yml up -d
# (or: `make up-gpu`)

services:
  ollama:
    image: ollama/ollama:latest
    container_name: intersight-chat-ollama
    ports:
      # Host port is configurable — set OLLAMA_HOST_PORT in .env if 11434
      # is already taken (e.g. Ollama is running natively on the host).
      - "${OLLAMA_HOST_PORT:-11434}:11434"
    environment:
      # Keep loaded models pinned in VRAM so consecutive prompts skip the
      # model-load cost. Default is 5m. The orchestrator also passes this
      # per-request, but setting it here covers everything.
      OLLAMA_KEEP_ALIVE: 24h
      # Single-slot inference: frees VRAM that Ollama would otherwise
      # reserve for parallel inference streams (default 4). Big models
      # like nemotron-3-super:120b want every spare byte for KV cache,
      # and this app only ever issues one request at a time anyway.
      OLLAMA_NUM_PARALLEL: ${OLLAMA_NUM_PARALLEL:-1}
      # Cap the number of models held in VRAM simultaneously. With the
      # sidebar model picker it's tempting for Ollama to keep several
      # warm at once; on a single 48 GB GPU that fragments memory and
      # eventually segfaults llama-server. 1 = swap on demand.
      OLLAMA_MAX_LOADED_MODELS: ${OLLAMA_MAX_LOADED_MODELS:-1}
    volumes:
      # Persist downloaded models across restarts. `docker compose down -v`
      # wipes them.
      - ollama_models:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: intersight-chat-app
    depends_on:
      ollama:
        condition: service_healthy
    ports:
      - "8501:8501"
    environment:
      OLLAMA_BASE_URL: http://ollama:11434/v1
      OLLAMA_TAGS_URL: http://ollama:11434/api/tags
      OLLAMA_API_KEY: ollama
      INTERSIGHT_BASE_URL: ${INTERSIGHT_BASE_URL:-https://intersight.com}
      # Preferred model to pre-select in the sidebar on first page load.
      # Override per environment in .env (e.g. DEFAULT_MODEL=qwen2.5:14b
      # for smaller GPUs). The app falls back to the first installed
      # model if this one isn't pulled. Must match Makefile's MODEL
      # variable so `make up-gpu` pulls and pre-warms the right model.
      DEFAULT_MODEL: ${DEFAULT_MODEL:-mistral-small3.1:24b}
      # Per-request KV-cache size sent to Ollama. Models advertise huge
      # max contexts (e.g. nemotron-3-super:120b = 256K), but the
      # runtime allocates KV memory for the WHOLE num_ctx upfront — for
      # a 120B MoE that's tens of GB and forces CPU offload on a single
      # L40S, dropping throughput from ~25 to ~6 tok/s. 8K is plenty for
      # this app's longest deterministic-route prompts (~5–6K tokens).
      # Raise it only if you're feeding very long reference documents.
      LLM_NUM_CTX: ${LLM_NUM_CTX:-8192}
      # Reasoning-trace toggle for models with a "thinking" capability
      # (e.g. nemotron-3-super, gpt-oss). When true the model emits a
      # large internal think block before the answer — accurate but
      # slow. For tool-call demos we want speed, not visible reasoning.
      # Models without thinking support silently ignore this option.
      LLM_THINKING: ${LLM_THINKING:-false}
    restart: unless-stopped

volumes:
  ollama_models:
