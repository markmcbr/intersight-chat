# Default compose: works on any host, no GPU required.
# To enable NVIDIA GPU passthrough for Ollama, layer in docker-compose.gpu.yml:
#   docker compose -f docker-compose.yml -f docker-compose.gpu.yml up -d
# (or: `make up-gpu`)

services:
  ollama:
    image: ollama/ollama:latest
    container_name: intersight-chat-ollama
    ports:
      # Host port is configurable — set OLLAMA_HOST_PORT in .env if 11434
      # is already taken (e.g. Ollama is running natively on the host).
      - "${OLLAMA_HOST_PORT:-11434}:11434"
    environment:
      # Keep loaded models pinned in VRAM so consecutive prompts skip the
      # model-load cost. Default is 5m. The orchestrator also passes this
      # per-request, but setting it here covers everything.
      OLLAMA_KEEP_ALIVE: 24h
      # Single-slot inference: frees VRAM that Ollama would otherwise
      # reserve for parallel inference streams (default 4). Big models
      # like nemotron-3-super:120b want every spare byte for KV cache,
      # and this app only ever issues one request at a time anyway.
      OLLAMA_NUM_PARALLEL: ${OLLAMA_NUM_PARALLEL:-1}
      # Cap the number of models held in VRAM simultaneously. With the
      # sidebar model picker it's tempting for Ollama to keep several
      # warm at once; on a single 48 GB GPU that fragments memory and
      # eventually segfaults llama-server. 1 = swap on demand.
      OLLAMA_MAX_LOADED_MODELS: ${OLLAMA_MAX_LOADED_MODELS:-1}
      # Server-side default for the KV-cache size. This MUST be set on
      # the ollama container (not as a per-request option) because the
      # OpenAI-compat /v1/chat/completions endpoint silently drops the
      # nested options.num_ctx field — see ollama/ollama#6286 and #6544.
      # Big models advertise huge max contexts (nemotron-3-super:120b =
      # 256K) and the runtime allocates KV memory for the WHOLE window
      # upfront, which forces CPU offload on a 48 GB GPU and tanks
      # throughput from ~25 to ~6 tok/s. 8192 is plenty for every
      # deterministic-route prompt in this app.
      OLLAMA_CONTEXT_LENGTH: ${LLM_NUM_CTX:-8192}
    volumes:
      # Persist downloaded models across restarts. `docker compose down -v`
      # wipes them.
      - ollama_models:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: intersight-chat-app
    depends_on:
      ollama:
        condition: service_healthy
    ports:
      - "8501:8501"
    environment:
      OLLAMA_BASE_URL: http://ollama:11434/v1
      OLLAMA_TAGS_URL: http://ollama:11434/api/tags
      OLLAMA_API_KEY: ollama
      INTERSIGHT_BASE_URL: ${INTERSIGHT_BASE_URL:-https://intersight.com}
      # Preferred model to pre-select in the sidebar on first page load.
      # gpt-oss:20b is the default: it's OpenAI's open-weight reasoning
      # model from Aug 2025, ~14 GB VRAM, native OpenAI tool-call format,
      # and runs at 30–50 tok/s on a single L40S. Override per env in
      # .env. The app falls back to the first installed model if this
      # one isn't pulled. Must match Makefile's MODEL variable so
      # `make up-gpu` pulls and pre-warms the right model.
      DEFAULT_MODEL: ${DEFAULT_MODEL:-gpt-oss:20b}
      # Reasoning-trace toggle for NON-gpt-oss thinking models (e.g.
      # nemotron-3-super). Default is true because nemotron-3-super:120b
      # on Ollama 0.30 returns an EMPTY response when think=false is
      # sent via the OpenAI-compat endpoint (eats both the thinking
      # block AND the answer). gpt-oss ignores this field — it uses
      # LLM_REASONING_EFFORT instead (see below). Models without
      # thinking support silently ignore both.
      LLM_THINKING: ${LLM_THINKING:-true}
      # gpt-oss family reasoning depth: low | medium | high. "low" is
      # the snappiest for tool-call demos (~30-50 tok/s on L40S);
      # raise it for harder open-ended prompts at the cost of speed.
      # Non-gpt-oss models silently ignore this field.
      LLM_REASONING_EFFORT: ${LLM_REASONING_EFFORT:-low}
      # Note: num_ctx is enforced on the ollama container via
      # OLLAMA_CONTEXT_LENGTH (the OpenAI-compat endpoint ignores
      # per-request options) — keep LLM_NUM_CTX and OLLAMA_CONTEXT_LENGTH
      # in sync if you override either.
    restart: unless-stopped

volumes:
  ollama_models:
